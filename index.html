<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>REST | Client Management</title>

  <!-- Favicon -->
  <link rel="icon" type="image/x-icon" href="/RoundedBlue/favicon.ico" />
  <link rel="icon" type="image/png" sizes="16x16" href="/RoundedBlue/favicon-16x16.png" />
  <link rel="icon" type="image/png" sizes="32x32" href="/RoundedBlue/favicon-32x32.png" />

  <!-- Apple Touch Icon -->
  <link rel="apple-touch-icon" sizes="180x180" href="/RoundedBlue/apple-touch-icon.png" />

  <!-- Android Chrome -->
  <link rel="icon" type="image/png" sizes="192x192" href="/RoundedBlue/android-chrome-192x192.png" />
  <link rel="icon" type="image/png" sizes="512x512" href="/RoundedBlue/android-chrome-512x512.png" />

  <!-- Web Manifest -->
  <link rel="manifest" href="/RoundedBlue/site.webmanifest" />

  <!-- Fonts: Plus Jakarta Sans (UI) + Fraunces (display) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
    rel="stylesheet"
  />

  <!-- Theme + color-theme bootstrap (prevents flash of wrong theme) -->
  <script>
    (function () {
      try {
        var theme = localStorage.getItem('rest-theme');
        document.documentElement.dataset.theme = theme === 'dark' ? 'dark' : 'light';

        var COLORS = {
          purple: { p: '139, 92, 246', l: '245, 243, 255', d: '124, 58, 237' },
          green: { p: '16, 185, 129', l: '236, 253, 245', d: '4, 120, 87' },
          red: { p: '244, 63, 94', l: '255, 241, 242', d: '190, 18, 60' },
          blue: { p: '59, 130, 246', l: '239, 246, 255', d: '29, 78, 216' },
          orange: { p: '249, 115, 22', l: '255, 247, 237', d: '194, 65, 12' },
          white: { p: '100, 116, 139', l: '248, 250, 252', d: '51, 65, 85' }
        };
        var stored = localStorage.getItem('rest-color-theme');
        var palette = COLORS[stored] || COLORS.blue;
        var s = document.documentElement.style;
        s.setProperty('--color-primary', palette.p);
        s.setProperty('--color-primary-light', palette.l);
        s.setProperty('--color-primary-dark', palette.d);
      } catch (e) { }
    })();
  </script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
